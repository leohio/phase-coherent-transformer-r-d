  - {id: "lra_listops_B_real_softmax_s0", task: "lra_listops", task_params: {max_seq_len: 2048, max_depth: 3, max_args: 4}, cell: "real_softmax", seed: 0, dim: 128, depth: 6, heads: 4, dim_head: 32, ff_mult: 4, lr: "4e-4", weight_decay: "0.01", batch_size: 16, micro_batch: 4, warmup: 1500, steps: 15000, eval_every: 1000, checkpoint_every: 3000, clip_grad: "1.0"}
  - {id: "lra_listops_B_real_softmax_s1", task: "lra_listops", task_params: {max_seq_len: 2048, max_depth: 3, max_args: 4}, cell: "real_softmax", seed: 1, dim: 128, depth: 6, heads: 4, dim_head: 32, ff_mult: 4, lr: "4e-4", weight_decay: "0.01", batch_size: 16, micro_batch: 4, warmup: 1500, steps: 15000, eval_every: 1000, checkpoint_every: 3000, clip_grad: "1.0"}
  - {id: "lra_listops_B_real_softmax_s2", task: "lra_listops", task_params: {max_seq_len: 2048, max_depth: 3, max_args: 4}, cell: "real_softmax", seed: 2, dim: 128, depth: 6, heads: 4, dim_head: 32, ff_mult: 4, lr: "4e-4", weight_decay: "0.01", batch_size: 16, micro_batch: 4, warmup: 1500, steps: 15000, eval_every: 1000, checkpoint_every: 3000, clip_grad: "1.0"}

  # ─────────────────────────────────────────────────────────────────────────
